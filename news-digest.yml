name: GCC News Digest

on:
  schedule:
    # Naponta 7:30-kor (UTC+3 Budapest idő = 5:30 UTC, majd +2 óra késés lehetséges)
    # GitHub Actions kicsit késik, ezért 5:30-kor indítjuk
    - cron: '30 5 * * *'
  workflow_dispatch:  # Kézi indítás teszteléshez

jobs:
  news-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests openai

      - name: Run news digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python news_digest.py

      - name: Log success
        if: success()
        run: echo "✅ GCC News Digest sikeresen futott"

      - name: Log error
        if: failure()
        run: echo "❌ GCC News Digest hiba"
